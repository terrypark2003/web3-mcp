# fly.toml app configuration file generated for web3-mcp on 2026-06-30T07:42:17Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'web3-mcp'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[processes]
  app = 'python -m polymarket_arb.telegram_bot'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
