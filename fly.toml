# Fly.io config for the always-on Telegram bot (worker — no inbound HTTP).
# Rename `app` to something globally unique (or let `fly launch` set it).
# Set secrets with `fly secrets set ...` — never commit them. See DEPLOY.md.
#
# IMPORTANT — region must be a Polymarket-Allowed jurisdiction, or live orders
# fail with `403 Trading restricted in your region`. The geoblock keys off the
# SERVER's IP, not yours. `iad`/`sjc` (US) are Blocked; `sin` (Singapore) is
# Close-only (can't OPEN positions). `hkg` (Hong Kong) is Allowed and is the
# lowest-latency Allowed region to Korea. See DEPLOY.md "Pick an Allowed region".
app = "polymarket-fav-bot"
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile"

# A polling bot exposes no port, so there is no [http_service]. With no service,
# the machine stays running (it is not auto-stopped on idle) — exactly what a
# long-poll bot needs.
[processes]
  app = "python -m polymarket_arb.telegram_bot"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
