name: World Cup value alerts

# Pushes NEW value World Cup bets (Polymarket price vs de-vigged bookmaker
# consensus) to Telegram, with a tappable link per bet. Default threshold is a
# +10% value edge ("$1 → ~$1.10 at fair odds"); lower NOTIFY_WC_MIN_EDGE to see
# thinner value.
#
# Cadence is bounded by the free odds-API tier (~500 requests/month): every 2h
# is ~360/month, comfortably under the cap and tighter than the old 3h. For
# match-time (live, in-play) alerts you need a PAID odds-API plan with live
# odds; then drop the cron to e.g. "*/15 * * * *" during the tournament.
#
# Requires repo Secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, ODDS_API_KEY.
# Scheduled runs only fire from the default branch.
on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours (~360 odds-API calls/month, under free tier)
  workflow_dispatch:
    inputs:
      demo:
        description: "Send a labelled DEMO test message (no odds API used)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: world-cup-alerts
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Restore alert state
        uses: actions/cache@v4
        with:
          path: notify_state.json
          key: world-cup-state-${{ github.run_id }}
          restore-keys: |
            world-cup-state-

      - name: Scan and notify
        env:
          NOTIFY_MODE: world_cup
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          NOTIFY_WC_MIN_EDGE: "0.10"   # +10% value vs consensus ("$1 -> ~$1.10")
          # Optional: one-line Gemini context note on each alert (off if no key).
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_ENRICH: "1"
          NOTIFY_DEMO: ${{ (github.event_name == 'workflow_dispatch' && inputs.demo) && '1' || '' }}
        run: python -m polymarket_arb.notify
